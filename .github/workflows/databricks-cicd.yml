name: fsi-fraud-detection CI/CD

# IMPORTANT — Runner choice for Databricks IP ACL
# ===============================================
# `fe-vm-ttan-vm.cloud.databricks.com` has a workspace IP ACL that blocks
# generic GitHub-hosted runners (vanilla `runs-on: ubuntu-latest`). The FE
# workspace allowlist only includes:
#   - Databricks VPN
#   - Databricks IT-managed GitHub runners
#   - Other demo workspaces
#   - Serverless control/data planes
#
# There are 3 ways to make this CI workflow work against the workspace:
#
#  A) **Move the repo into the `databricks-field-eng` GitHub org** (best path
#     for real customer demos) and switch to:
#         runs-on:
#           group: databricks-field-eng-protected-runner-group
#           labels: linux-ubuntu-latest
#     IT-managed runners are pre-approved by FE's IP ACL.
#
#  B) **Register a self-hosted runner** on a host that's already on the
#     allowlist (your Mac on Databricks VPN, or a small VM). Then use
#     `runs-on: self-hosted`. Setup steps in scripts/setup-self-hosted-runner.md.
#
#  C) **Don't talk to the workspace from CI at all**: keep CI scoped to
#     lint+pytest (no creds needed), and run `databricks bundle deploy`
#     manually from your laptop. Cheapest, least automated.
#
# The jobs below are written for OPTION B (self-hosted) since this repo is
# at github.com/tiantan32 (personal, not in the databricks org). If you
# move the repo to databricks-field-eng later, swap the runs-on stanza to
# the option-A version above.
#
# Gates:
#   PR open/update  -> lint + pytest + bundle validate on staging   (no deploy)
#   PR merge to main -> deploy + smoke-run on staging               (auto)
#   Manual dispatch  -> deploy to prod                              (BLOCKED until
#                                                                   the `prod` GH
#                                                                   Environment
#                                                                   reviewer approves)
#
# Once code is deployed, the mlops Databricks job runs end-to-end without a
# per-run human gate. Automated quality gates inside the job:
#   - fairness check (09_explainability_fairness) — halts the DAG on bias
#   - challenger validation (04_challenger_validation) — promotes to
#     @Champion only on full pass (metrics + fairness + business KPI)
#
# The "should this code reach prod?" decision lives HERE, in the prod
# Environment reviewer assignment. Configure in
# GitHub Settings -> Environments -> prod -> Required reviewers.

on:
  pull_request:
    branches: [main]
    paths:
      - "databricks.yml"
      - "resources/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/databricks-cicd.yml"
  push:
    branches: [main]
    paths:
      - "databricks.yml"
      - "resources/**"
      - "src/**"
  workflow_dispatch:
    inputs:
      target:
        description: "Bundle target to deploy"
        required: true
        default: "prod"
        type: choice
        options: [staging, prod]

jobs:
  # ------------------------------------------------------------------
  # CI: lint + unit tests. Runs on every PR. No Databricks creds needed.
  # ------------------------------------------------------------------
  lint-and-test:
    name: Lint + unit tests
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test deps
        run: pip install -e ".[test]"
      - name: Ruff lint
        run: ruff check src/lib tests
      - name: Pytest
        run: pytest tests/ -v

  # ------------------------------------------------------------------
  # PR check: bundle validates against staging credentials.
  # ------------------------------------------------------------------
  validate-staging:
    name: Validate bundle (staging)
    if: github.event_name == 'pull_request'
    # Self-hosted because GitHub-hosted IPs are blocked by FE workspace IP ACL.
    # See header comment for options A (org runners), B (this), and C (no CI).
    runs-on: [self-hosted, fsi-fraud-cicd]
    needs: lint-and-test
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_STAGING }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_STAGING }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - run: databricks bundle validate --target staging

  # ------------------------------------------------------------------
  # On merge to main: deploy + smoke-run the staging bundle.
  # ------------------------------------------------------------------
  deploy-staging:
    name: Deploy to staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, fsi-fraud-cicd]
    needs: lint-and-test
    environment:
      # No reviewer required on staging — see GitHub Settings -> Environments
      name: staging
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_STAGING }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_STAGING }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - run: databricks bundle validate --target staging
      - run: databricks bundle deploy --target staging
      - name: Trigger mlops job (staging smoke run)
        run: databricks bundle run fsi_fraud_mlops --target staging

  # ------------------------------------------------------------------
  # Manual dispatch: deploy to prod, gated by the `prod` Environment
  # reviewer. THIS is the human-in-the-loop approval for releases.
  # ------------------------------------------------------------------
  deploy-prod:
    name: Deploy to prod (manual approval)
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'prod'
    runs-on: [self-hosted, fsi-fraud-cicd]
    environment:
      # Configure in GitHub Settings -> Environments -> prod -> Required reviewers
      name: prod
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - run: databricks bundle validate --target prod
      - run: databricks bundle deploy --target prod
      # Deploy only — do NOT auto-trigger the prod mlops job. The on-call
      # triggers fsi_fraud_mlops in the prod workspace on the normal cadence.
      # All automated quality gates run inside that job (fairness + metric +
      # business KPI). The human decision was already made when the prod
      # Environment reviewer approved this deploy above.
