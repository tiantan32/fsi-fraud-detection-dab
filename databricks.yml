bundle:
  name: fsi-fraud-detection

variables:
  catalog:
    description: Unity Catalog name for all tables, models, and volumes
    default: main
  schema:
    description: Schema (database) name within the catalog
    default: dbdemos_fsi_fraud_detection
  volume_name:
    description: Volume name for raw data storage
    default: fraud_raw_data
  warehouse_id:
    description: SQL Warehouse ID used by the dbt task and dashboard queries
    default: ""
  dbt_schema:
    description: Schema (database) for dbt-materialized tables
    default: fsi_fraud_detection_dbt

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

sync:
  include:
    - "src/**"
    - "dashboards/**"

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fe-vm-ttan-vm.cloud.databricks.com
    variables:
      catalog: ttan_demo_catalog_main
      schema: fsi_fraud_detection
      warehouse_id: 11d6beea79229431
      dbt_schema: fsi_fraud_detection_dbt

  staging:
    workspace:
      host: https://fe-vm-ttan-vm.cloud.databricks.com
    variables:
      catalog: ttan_demo_catalog_main
      schema: fsi_fraud_detection_staging

  prod:
    mode: production
    workspace:
      host: https://fe-vm-ttan-vm.cloud.databricks.com
    variables:
      catalog: ttan_demo_catalog_main
      schema: fsi_fraud_detection
    run_as:
      service_principal_name: ${workspace.current_user.userName}
